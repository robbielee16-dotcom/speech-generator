<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Johnsons Coach Departure Speech Generator</title>

<style>
  :root {
    --brandBlue: #005eb8;
    --brandYellow: #ffc20e;
    --text: #222;
    --muted: #666;
    --bg: #f5f8fb;
    --card: #ffffff;
  }

  body {
    margin: 0;
    background: var(--bg);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  header {
    background: linear-gradient(90deg, var(--brandBlue), #003f7f);
    color: white;
    padding: 20px 24px;
  }

  header h1 {
    margin: 0;
    font-size: 1.7rem;
    font-weight: 700;
  }

  header p {
    margin: 6px 0 0;
    opacity: .9;
  }

  main {
    max-width: 1100px;
    margin: 24px auto;
    padding: 0 16px;
  }

  .panel {
    background: var(--card);
    border: 1px solid #dbe4f0;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 20px;
    box-shadow: 0 2px 4px rgba(0,0,0,.05);
  }

  label {
    display: block;
    margin: 8px 0 4px;
    font-weight: 600;
  }

  select, input[type="text"], input[type="number"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #cbd7e6;
    border-radius: 8px;
    font-size: 14px;
  }

  .grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  }

  .tone-chip {
    display: inline-block;
    padding: 6px 12px;
    background: #eef3fb;
    border: 1px solid #d6e2f0;
    border-radius: 999px;
    margin: 4px 6px 0 0;
    cursor: pointer;
    font-size: 14px;
  }

  .tone-chip.active {
    background: var(--brandYellow);
    border-color: #e0ad00;
  }

  .btn {
    background: var(--brandBlue);
    border: none;
    border-radius: 8px;
    color: white;
    padding: 10px 14px;
    cursor: pointer;
    font-weight: 600;
  }

  .btn.secondary {
    background: #e6edf7;
    color: #003f7f;
  }

  .btn.ghost {
    background: transparent;
    border: 1px solid #b8c7dd;
    color: #003f7f;
  }

  .speeches {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
    gap: 16px;
  }

  .speech {
    background: white;
    border-radius: 12px;
    border: 1px solid #dbe4f0;
    padding: 14px;
  }

  .speech pre {
    background: #f7faff;
    border: 1px dashed #d2dceb;
    border-radius: 8px;
    padding: 12px;
    white-space: pre-wrap;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .muted {
    margin-top: 8px;
    color: var(--muted);
    font-size: .9rem;
  }

</style>
</head>

<body>

<header>
  <h1>Johnsons Coach Departure Speech Generator</h1>
  <p>Warm, friendly, humorous welcomes for every holiday departure.</p>
</header>

<main>

<!-- Controls Panel -->
<section class="panel">
  <div class="grid">
    <div>
      <label for="destination">Destination</label>
      <select id="destination">
        <option>Loading…</option>
      </select>
      <div id="nicknameHint" class="muted"></div>
    </div>

    <div>
      <label for="driver">Driver</label>
      <input type="text" id="driver" placeholder="e.g., Chris">
    </div>

    <div>
      <label for="courier">Courier</label>
      <input type="text" id="courier" placeholder="e.g., Sarah">
    </div>

    <div>
      <label for="count">How many speeches?</label>
      <input type="number" id="count" min="1" max="10" value="6">
    </div>
  </div>

  <label style="margin-top:14px;">Tone</label>
  <div id="tones"></div>

  <div class="grid" style="margin-top:12px;">
    <div>
      <label>Extra line (optional)</label>
      <input id="custom" type="text" placeholder="Birthday, group type…">
    </div>

    <div>
      <label>Facts per speech</label>
      <select id="factsCount">
        <option>1</option>
        <option>2</option>
        <option selected>3</option>
      </select>
    </div>

    <div>
      <label>Include Robbie’s role line?</label>
      <select id="includeRole">
        <option value="yes" selected>Yes</option>
        <option value="no">No</option>
      </select>
    </div>
  </div>

  <div style="margin-top:18px; display:flex; gap:12px; flex-wrap:wrap;">
    <button class="btn" id="generate">Generate Speeches</button>
    <button class="btn secondary" id="shuffle">Shuffle Facts Only</button>
    <button class="btn ghost" id="printAll">Print/Save</button>
  </div>

  <div class="muted">
    Tip: “Shuffle Facts Only” keeps your tone and opening but rotates fun facts.
  </div>
</section>

<!-- Results Panel -->
<section class="panel">
  <h3>Your Speeches</h3>
  <div class="speeches" id="speeches"></div>
</section>

</main>

<script>
/* -------------------------------
   DESTINATIONS DATA
   ------------------------------- */
const DESTINATIONS = {
  "Llandudno": {
    nickname: "Queen of the Welsh Resorts",
    facts: [
      "The Great Orme Tramway is the UK's only cable‑hauled street tramway.",
      "Wild Kashmiri goats famously roamed the streets during lockdown.",
      "The Victorian pier is the longest in Wales.",
      "The town has links to the inspiration behind Alice in Wonderland."
    ]
  },

  "Snowdonia": {
    nickname: "Mountains, steam trains & mighty views",
    facts: [
      "Home to the fastest zip line in the world.",
      "Snowdon can be reached by the historic mountain railway.",
      "The National Park covers over 800 square miles."
    ]
  },

  "Tenby": {
    nickname: "Pastel‑perfect harbour gem",
    facts: [
      "The harbour cottages are painted bright colours to help sailors spot home.",
      "One of the best-preserved medieval town walls in Wales.",
      "Caldey Island nearby has been monastic for over 1,000 years."
    ]
  },

  "Gower Peninsula": {
    nickname: "Britain’s first Area of Outstanding Natural Beauty",
    facts: [
      "Designated the UK’s first AONB in 1956.",
      "Rhossili Bay is often ranked among the world’s best beaches.",
      "Worm’s Head is reachable by foot at low tide."
    ]
  },

  "Bournemouth": {
    nickname: "Sun, sand & seven miles of beach",
    facts: [
      "Britain’s first beach hut appeared here in 1908.",
      "One of the sunniest spots in the UK.",
      "Its spectacular coastal path links multiple golden beaches."
    ]
  },

  "Eastbourne": {
    nickname: "The sunniest place in the UK",
    facts: [
      "Beachy Head is Britain’s highest chalk sea cliff.",
      "Its seafront is famously neat and traditional.",
      "The pier dates to 1872 and remains iconic."
    ]
  },

  "Isle of Wight": {
    nickname: "The Diamond Isle",
    facts: [
      "Home to Queen Victoria’s beloved Osborne House.",
      "The hovercraft remains a scheduled passenger service.",
      "The Needles are iconic chalk stacks at the island’s tip."
    ]
  },

  "Kent": {
    nickname: "The Garden of England",
    facts: [
      "Renowned for orchards, vineyards and hop gardens.",
      "Canterbury Cathedral has welcomed pilgrims for centuries.",
      "The White Cliffs of Dover are a national symbol."
    ]
  },

  "Torquay": {
    nickname: "The English Riviera",
    facts: [
      "Birthplace of Agatha Christie.",
      "Palm-lined promenades offer a Mediterranean feel.",
      "Nearby Babbacombe has one of Britain’s steepest cliff railways."
    ]
  },

  "Sidmouth": {
    nickname: "Regency seaside elegance",
    facts: [
      "Part of the UNESCO Jurassic Coast.",
      "Home to the Donkey Sanctuary nearby.",
      "Beautiful Regency architecture lines the seafront."
    ]
  },

  "Falmouth": {
    nickname: "Harbour, history & Cornish charm",
    facts: [
      "One of the world’s deepest natural harbours.",
      "Pendennis Castle guarded the Fal Estuary since Henry VIII.",
      "Boat trips to St Mawes run regularly."
    ]
  }
};

/* -------------------------------
   TONES
   ------------------------------- */

const TONES = {
  "Warm": {
    openings: [
      "Good morning everyone! I’m Robbie, the Product Manager here at Johnsons Coaches — lovely to see you today.",
      "Hello folks! Robbie here — wishing you a wonderful holiday ahead.",
      "A very warm welcome aboard from me, Robbie, your Product Manager."
    ],
    jokes: [
      "I design the holidays; our drivers make them work — so you’re in excellent hands.",
      "If anything goes wrong today, don’t worry — it was probably part of my plan!"
    ],
    closers: [
      "Sit back, relax and enjoy the journey — and thank you for choosing Johnsons.",
      "Have a fantastic holiday, and thank you for travelling with Johnsons Coaches!"
    ]
  },

  "Cheeky": {
    openings: [
      "Morning! Robbie here — I plan the holidays and you do the relaxing. Fair trade?",
      "Hello team! I’m Robbie, your friendly Product Manager — yes, I make the spreadsheets so you don’t have to."
    ],
    jokes: [
      "If you enjoy the tour, please tell everyone. If not… tell my manager it was the driver’s idea.",
      "Today’s mileage has been pre-approved by your knees!"
    ],
    closers: [
      "Have a cracking time — let’s make some memories worth bragging about.",
      "Right then — kettle’s off, seatbelts on, away we go!"
    ]
  }
};

/* -------------------------------
   HELPER FUNCTIONS
   ------------------------------- */

const byId = id => document.getElementById(id);
const choice = arr => arr[Math.floor(Math.random() * arr.length)];
const shuffle = arr => arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);

/* Populate destination dropdown */
function buildDestinationSelect() {
  const sel = byId("destination");
  sel.innerHTML = "";

  Object.keys(DESTINATIONS).sort().forEach(dest => {
    let opt = document.createElement("option");
    opt.value = opt.textContent = dest;
    sel.appendChild(opt);
  });

  sel.addEventListener("change", () => {
    const d = DESTINATIONS[sel.value];
    byId("nicknameHint").textContent = d ? `Nickname: ${d.nickname}` : "";
  });

  sel.dispatchEvent(new Event("change"));
}

/* Build tone chips */
function buildToneChips() {
  const wrap = byId("tones");
  Object.keys(TONES).forEach(t => {
    let chip = document.createElement("span");
    chip.className = "tone-chip";
    chip.textContent = t;
    chip.dataset.tone = t;

    chip.onclick = () => {
      document.querySelectorAll(".tone-chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
    };

    wrap.appendChild(chip);
  });

  wrap.firstChild.classList.add("active");
}

/* Build speech text */
function makeSpeech(settings) {
  const { toneKey, destination, driver, courier, custom, factsCount, includeRole } = settings;
  const tone = TONES[toneKey];
  const dest = DESTINATIONS[destination];

  const facts = shuffle(dest.facts).slice(0, factsCount);
  const role = includeRole === "yes" ? " I’m the Product Manager here at Johnsons Coaches." : "";

  const open = choice(tone.openings).replace("I’m Robbie", "I’m Robbie" + (role ? "" : ""));
  const intro = `Today you’re heading to ${destination}, ${dest.nickname}.`;

  const factIntro = factsCount > 1 ? "Here are a couple of fun bits:" : "Here’s a fun fact:";
  const factText = factsCount > 1 ? facts.map(f=>"• "+f).join("\n") : facts[0];

  const team = `You’re in safe hands today with your driver ${driver || "[Driver]"}${courier ? " and courier " + courier : ""}.`;
  const joke = tone.jokes.length ? " " + choice(tone.jokes) : "";
  const outro = choice(tone.closers);
  const customLine = custom ? "\n" + custom : "";

  return `${open}\n\n${intro}\n\n${factIntro}\n${factText}\n\n${team}${joke}${customLine}\n\n${outro}`;
}

/* Render speeches */
function renderSpeeches(list) {
  const wrap = byId("speeches");
  wrap.innerHTML = "";

  list.forEach(text => {
    let card = document.createElement("div");
    card.className = "speech";

    let pre = document.createElement("pre");
    pre.textContent = text;
    card.appendChild(pre);

    let act = document.createElement("div");
    act.className = "actions";

    let copyBtn = document.createElement("button");
    copyBtn.className = "btn secondary";
    copyBtn.textContent = "Copy";
    copyBtn.onclick = async () => {
      await navigator.clipboard.writeText(text);
      copyBtn.textContent = "Copied!";
      setTimeout(()=> copyBtn.textContent="Copy", 1000);
    };

    act.appendChild(copyBtn);
    card.appendChild(act);
    wrap.appendChild(card);
  });
}

/* Generate speeches */
function generate(shuffleOnly=false) {
  const destination = byId("destination").value;
  const driver = byId("driver").value.trim();
  const courier = byId("courier").value.trim();
  const count = parseInt(byId("count").value);
  const factsCount = parseInt(byId("factsCount").value);
  const includeRole = byId("includeRole").value;
  const custom = byId("custom").value.trim();

  const activeTone = document.querySelector(".tone-chip.active").dataset.tone;

  let speeches = [];
  for (let i = 0; i < count; i++) {
    const toneKey = shuffleOnly ? activeTone : choice(Object.keys(TONES));
    speeches.push(makeSpeech({ toneKey, destination, driver, courier, custom, factsCount, includeRole }));
  }

  renderSpeeches(speeches);
}

/* Init */
window.onload = () => {
  buildDestinationSelect();
  buildToneChips();
  generate();
  byId("generate").onclick = () => generate(false);
  byId("shuffle").onclick = () => generate(true);
  byId("printAll").onclick = () => window.print();
};
</script>

</body>
</html>
